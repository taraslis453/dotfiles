# ═══════════════════════════════════════════════════════════════════
# KITTY CONFIGURATION - Performance & Visual Only (No Keybind Changes)
# ═══════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────
# PERFORMANCE OPTIMIZATIONS
# ───────────────────────────────────────────────────────────────────
# Faster screen updates
repaint_delay 2
input_delay 0
sync_to_monitor no
wayland_enable_ime no

# ───────────────────────────────────────────────────────────────────
# FONT CONFIGURATION
# ───────────────────────────────────────────────────────────────────
# Using FiraCode Nerd Font (better icons, ligatures)
font_family      FiraCode Nerd Font Mono
bold_font        FiraCode Nerd Font Mono Bold
italic_font      FiraCode Nerd Font Mono Light
bold_italic_font FiraCode Nerd Font Mono SemiBold

# Alternative: JetBrainsMono (uncomment to use)
# font_family      JetBrainsMono NFM
# bold_font        JetBrainsMono NFM Bold
# italic_font      JetBrainsMono NFM Italic
# bold_italic_font JetBrainsMono NFM Bold Italic

font_size 13.0

# Font rendering (enable ligatures for FiraCode)
disable_ligatures never

# VS Code-like spacing (tighter than 120%)
adjust_line_height  0
adjust_column_width 0

# ───────────────────────────────────────────────────────────────────
# CURSOR & MOUSE
# ───────────────────────────────────────────────────────────────────
cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 15.0

mouse_hide_wait 1.0
url_color #89b4fa
url_style curly
detect_urls yes

# Copy on select (like VS Code)
copy_on_select yes

# ───────────────────────────────────────────────────────────────────
# SCROLLBACK (Better for development)
# ───────────────────────────────────────────────────────────────────
scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 10

# Better scrolling
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 1.0

# ───────────────────────────────────────────────────────────────────
# TERMINAL BELL (Disable annoying sounds)
# ───────────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no
bell_on_tab no

# ───────────────────────────────────────────────────────────────────
# WINDOW LAYOUT
# ───────────────────────────────────────────────────────────────────
remember_window_size yes
initial_window_width 1200
initial_window_height 800

# Window padding (breathing room)
window_padding_width 4

# Draw minimal borders
draw_minimal_borders yes
window_border_width 1.0
placement_strategy center

# ───────────────────────────────────────────────────────────────────
# TAB BAR
# ───────────────────────────────────────────────────────────────────
tab_bar_min_tabs 1
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# ───────────────────────────────────────────────────────────────────
# COLORSCHEME - Catppuccin Mocha (matches Neovim & Cursor)
# ───────────────────────────────────────────────────────────────────
background #1e1e1e
foreground #cdd6f4
selection_background #585b70
selection_foreground #cdd6f4
url_color #89b4fa
cursor #f5e0dc
cursor_text_color #1e1e1e

# Tabs
active_tab_background #89b4fa
active_tab_foreground #11111b
inactive_tab_background #313244
inactive_tab_foreground #7f849c
tab_bar_background #181825

# Windows
active_border_color #89b4fa
inactive_border_color #313244

# normal
color0 #45475a
color1 #f38ba8
color2 #a6e3a1
color3 #f9e2af
color4 #89b4fa
color5 #f5c2e7
color6 #94e2d5
color7 #bac2de

# bright
color8 #585b70
color9 #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #a6adc8

# extended colors
color16 #fab387
color17 #f5e0dc

# ───────────────────────────────────────────────────────────────────
# MACOS SPECIFIC
# ───────────────────────────────────────────────────────────────────
wayland_titlebar_color system
macos_titlebar_color system
macos_option_as_alt yes
macos_thicken_font 0
macos_quit_when_last_window_closed yes

# ───────────────────────────────────────────────────────────────────
# ADVANCED FEATURES
# ───────────────────────────────────────────────────────────────────
# Better clipboard integration
clipboard_control write-clipboard write-primary read-clipboard read-primary

# Shell integration (better prompt, etc.)
shell_integration enabled
allow_remote_control no

# Update check
update_check_interval 24

# Confirm before closing window with running programs
confirm_os_window_close 1

# ───────────────────────────────────────────────────────────────────
# YOUR EXISTING KEYBINDS (Unchanged)
# ───────────────────────────────────────────────────────────────────
map ctrl+. next_tab
map ctrl+, previous_tab
map shift+cmd+t new_tab_with_cwd
map shift+cmd+c close_tab
map shift+enter send_text normal,application \x1b[13;2u
