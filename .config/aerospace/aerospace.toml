# =============================================================================
# Aerospace configuration for Taras
# 
# Workspace 1 = Browser + Calendar (Mac display / built-in)
# Workspace 2 = Code (external monitor)
# Workspace 3 = Chat + Calls (external monitor)
# Zoom: workspace 1 on dual monitors, workspace 3 on single monitor
# =============================================================================

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = ['move-mouse window-lazy-center']

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.bottom = 8
outer.top = 8

# =============================================================================
# WORKSPACE TO MONITOR ASSIGNMENT
# =============================================================================
[workspace-to-monitor-force-assignment]
1 = 'main'        # Browser on Mac display
2 = 'secondary'   # Code on external
3 = 'secondary'   # Chat on external

# =============================================================================
# MAIN MODE KEYBINDINGS
# =============================================================================
[mode.main.binding]

# -----------------------------------------------------------------------------
# FOCUS WINDOWS (ctrl + caps + hjkl)
# -----------------------------------------------------------------------------
ctrl-cmd-h = 'focus left'
ctrl-cmd-j = 'focus down'
ctrl-cmd-k = 'focus up'
ctrl-cmd-l = 'focus right'

# -----------------------------------------------------------------------------
# MOVE WINDOWS (ctrl + caps + shift + hjkl)
# -----------------------------------------------------------------------------
ctrl-cmd-shift-h = 'move left'
ctrl-cmd-shift-j = 'move down'
ctrl-cmd-shift-k = 'move up'
ctrl-cmd-shift-l = 'move right'

# -----------------------------------------------------------------------------
# WORKSPACES (ergonomic right-hand keys)
# caps + ; = Browser
# caps + ' = Code  
# caps + \ = Chat
# -----------------------------------------------------------------------------
cmd-semicolon = 'workspace 1'
cmd-quote = 'workspace 2'
cmd-backslash = 'workspace 3'

# Move window to workspace
cmd-shift-semicolon = 'move-node-to-workspace 1'
cmd-shift-quote = 'move-node-to-workspace 2'
cmd-shift-backslash = 'move-node-to-workspace 3'

# Back and forth between last 2 workspaces (caps + tab)
cmd-tab = 'workspace-back-and-forth'

# -----------------------------------------------------------------------------
# MONITORS
# ctrl + caps + ; to jump between monitors
# ctrl + caps + shift + ,/. to move window to monitor and follow
# -----------------------------------------------------------------------------
ctrl-cmd-semicolon = 'focus-monitor next'

ctrl-cmd-shift-comma = ['move-node-to-monitor prev', 'focus-monitor prev']
ctrl-cmd-shift-period = ['move-node-to-monitor next', 'focus-monitor next']

# -----------------------------------------------------------------------------
# WINDOW MANAGEMENT
# -----------------------------------------------------------------------------
ctrl-cmd-f = 'fullscreen'
cmd-shift-space = 'layout floating tiling'
cmd-shift-w = 'close'

# -----------------------------------------------------------------------------
# LAYOUT
# -----------------------------------------------------------------------------
cmd-e = 'layout tiles horizontal vertical'
cmd-s = 'layout accordion horizontal vertical'
cmd-b = 'balance-sizes'

# -----------------------------------------------------------------------------
# RESIZE MODE (caps + shift + / to enter)
# -----------------------------------------------------------------------------
cmd-shift-slash = 'mode resize'

# -----------------------------------------------------------------------------
# RELOAD CONFIG
# -----------------------------------------------------------------------------
ctrl-cmd-shift-r = 'reload-config'

# =============================================================================
# RESIZE MODE
# Enter with caps + shift + /
# Use hjkl to resize
# Press esc or enter to exit
# =============================================================================
[mode.resize.binding]
h = 'resize width -50'
l = 'resize width +50'
k = 'resize height +50'
j = 'resize height -50'

# Fine adjustments with shift
shift-h = 'resize width -10'
shift-l = 'resize width +10'
shift-k = 'resize height +10'
shift-j = 'resize height -10'

# Exit resize mode
esc = 'mode main'
enter = 'mode main'

# =============================================================================
# FLOATING WINDOWS
# =============================================================================
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.SystemPreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'org.pqrs.Karabiner-Elements.Settings'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.raycast.macos'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.1password.1password'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'io.tldv.desktop'
run = 'layout floating'

# =============================================================================
# WORKSPACE ASSIGNMENTS
# 1 = Browser + Calendar (Mac display)
# 2 = Code (external monitor)
# 3 = Chat + Calls (external monitor)
# =============================================================================

# Workspace 1: Browser + Calendar (Mac display)
[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = 'move-node-to-workspace 1'


[[on-window-detected]]
if.app-id = 'com.brave.Browser'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.logseq.logseq'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.apple.Notes'
run = 'move-node-to-workspace 1'

[[on-window-detected]]
if.app-id = 'com.apple.iCal'
run = 'move-node-to-workspace 1'

# Workspace 2: Code (external monitor)
[[on-window-detected]]
if.app-id = 'net.kovidgoyal.kitty'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'org.alacritty'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.apple.Terminal'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.apple.TextInputUI.xpc.CursorUIViewService'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.jetbrains.goland'
run = 'move-node-to-workspace 2'

# Workspace 3: Chat + Calls (external monitor)
[[on-window-detected]]
if.app-id = 'ru.keepcoder.Telegram'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = ['layout tiling', 'move-node-to-workspace 3']

[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = ['layout tiling', '''exec-and-forget bash -c "
  if [ $(aerospace list-monitors | wc -l | tr -d ' ') -gt 1 ]; then
    aerospace move-node-to-workspace --window-id $AEROSPACE_WINDOW_ID 1
  else
    aerospace move-node-to-workspace --window-id $AEROSPACE_WINDOW_ID 3
  fi
"''']

[[on-window-detected]]
if.app-id = 'io.tldv.desktop'
run = 'move-node-to-workspace 3'
